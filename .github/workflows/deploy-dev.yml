name: Deploy Dev

# deployment-safety: manual trigger only — never auto-deploy on push
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-dev" to confirm'
        required: true

jobs:
  deploy:
    if: github.event.inputs.confirm == 'deploy-dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Build Lambda bundles
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build
          pnpm --filter @conversational-ai/api bundle

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform apply
        run: terraform apply -input=false tfplan
